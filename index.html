<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>飆股雷達 2026-05-06</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c0f;--surface:#111418;--surface2:#181c22;--border:#222830;--accent:#f0b429;--text:#e2e8f0;--muted:#718096;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;}
header{border-bottom:1px solid var(--border);padding:20px 32px;position:sticky;top:0;background:rgba(10,12,15,.95);z-index:50}
.logo{font-size:20px;font-weight:900;color:var(--accent)}
main{max-width:1400px;margin:0 auto;padding:32px}
.sec-title{font-size:11px;color:var(--muted);margin-bottom:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px}
.filter-panel{background:var(--surface);border:1px solid var(--border);padding:24px;margin-bottom:32px}
.filters-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.f-select,.f-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;width:100%}
.toggle-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.toggle-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
.toggle-btn.on{background:rgba(240,180,41,.12);border-color:var(--accent);color:var(--accent)}
.run-btn{width:100%;padding:14px;margin-top:20px;background:var(--accent);color:#0a0c0f;font-weight:700;border:none;cursor:pointer}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:12px;text-align:left;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:12px;border-bottom:1px solid rgba(34,40,48,.6)}
.stock-link{text-decoration:none;color:#63b3ed}
.stock-link:hover{text-decoration:underline}
.sig{display:inline-block;padding:2px 6px;font-size:10px;border-radius:2px;margin:1px}
.sig-型態{background:#dbeafe;color:#1d4ed8}
.sig-籌碼{background:#fef9c3;color:#92400e}
.sig-趨勢{background:#dcfce7;color:#15803d}
.sig-動能{background:#f3e8ff;color:#7e22ce}
.sig-題材{background:#fee2e2;color:#b91c1c}
.up{color:#fc8181}.down{color:#68d391}
</style>
</head>
<body>
<header>
  <div class="logo">🎯 飆股雷達</div>
  <div style="font-size:12px;color:var(--muted);margin-top:4px">2026-05-06（週三） • 14 檔</div>
</header>
<main>
<div class="sec-title">篩選條件</div>
<div class="filter-panel">
  <div class="filters-grid">
    <div>
      <label style="font-size:11px;color:var(--muted)">進場策略</label>
      <select class="f-select" id="f-entry" onchange="render()">
        <option value="">全部</option>
        <option value="盤整突破">盤整突破</option>
        <option value="回後買上漲">回後買上漲</option>
        <option value="強勢上漲">強勢上漲</option>
        <option value="題材熱股">題材熱股</option>
      </select>
    </div>
    <div>
      <label style="font-size:11px;color:var(--muted)">產業別</label>
      <select class="f-select" id="f-ind" onchange="render()">
        <option value="">全部</option>
        <option value="電子零組件">電子零組件</option><option value="光電">光電</option><option value="其他">其他</option>
      </select>
    </div>
    <div>
      <label style="font-size:11px;color:var(--muted)">市值規模</label>
      <select class="f-select" id="f-cap" onchange="render()">
        <option value="">全部</option>
        <option value="大型股">大型股</option>
        <option value="中型股">中型股</option>
        <option value="小型股">小型股</option>
        <option value="微型股">微型股</option>
      </select>
    </div>
    <div>
      <label style="font-size:11px;color:var(--muted)">最低評分</label>
      <input class="f-input" type="number" id="f-score" value="55" min="0" max="100" onchange="render()">
    </div>
  </div>
  <div class="toggle-row">
    <span style="font-size:11px;color:var(--muted)">訊號篩選：</span>
    <button class="toggle-btn" data-sig="型態" onclick="toggleSig(this)">型態</button>
    <button class="toggle-btn" data-sig="籌碼" onclick="toggleSig(this)">籌碼</button>
    <button class="toggle-btn" data-sig="趨勢" onclick="toggleSig(this)">趨勢</button>
    <button class="toggle-btn" data-sig="動能" onclick="toggleSig(this)">動能</button>
    <button class="toggle-btn" data-sig="題材" onclick="toggleSig(this)">題材</button>
  </div>
  <button class="run-btn" onclick="render()">🔍 套用篩選</button>
</div>

<div style="margin-bottom:16px">
  <span style="font-size:13px">找到 <span id="cnt" style="color:var(--accent);font-weight:700">-</span> 檔候選</span>
</div>
<div class="table-wrap">
  <table>
    <thead><tr style="background:var(--surface2)">
      <th onclick="sortBy('code',this)" style="cursor:pointer">代號</th>
      <th onclick="sortBy('price',this)" style="cursor:pointer">現價</th>
      <th onclick="sortBy('chg',this)" style="cursor:pointer">漲跌%</th>
      <th onclick="sortBy('score',this)" style="cursor:pointer">評分</th>
      <th>訊號</th>
      <th>產業</th>
      <th>市值</th>
      <th>策略</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</main>

<script>
const ALL = [{"code": "3231", "price": 146.5, "chg": 3.17, "score": 100, "signals": ["型態", "籌碼", "動能"], "consolidation_days": 50, "vol_ratio": 1.79, "momentum_5d": 4.27, "entry": "盤整突破", "ma_bull4": false, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": -0.34, "body_pct": 2.09}, "industry": "其他", "name": "緯創", "cap_size": "中型股"}, {"code": "3006", "price": 200.0, "chg": 9.89, "score": 100, "signals": ["型態", "籌碼", "趨勢", "動能"], "consolidation_days": 21, "vol_ratio": 1.65, "momentum_5d": 8.4, "entry": "盤整突破", "ma_bull4": false, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": -6.67, "body_pct": 0.0}, "industry": "其他", "name": "晶豪科", "cap_size": "中型股"}, {"code": "3014", "price": 132.5, "chg": 1.15, "score": 100, "signals": ["型態", "籌碼", "趨勢", "動能"], "consolidation_days": 59, "vol_ratio": 1.72, "momentum_5d": 7.29, "entry": "盤整突破", "ma_bull4": true, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": -0.76, "body_pct": -0.38}, "industry": "其他", "name": "聯陽", "cap_size": "中型股"}, {"code": "3033", "price": 42.4, "chg": 9.99, "score": 100, "signals": ["型態", "籌碼", "趨勢", "動能"], "consolidation_days": 20, "vol_ratio": 8.11, "momentum_5d": 17.13, "entry": "盤整突破", "ma_bull4": true, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": -9.42, "body_pct": 3.92}, "industry": "其他", "name": "威健", "cap_size": "小型股"}, {"code": "3034", "price": 441.5, "chg": 5.12, "score": 100, "signals": ["型態", "籌碼", "趨勢", "動能"], "consolidation_days": 51, "vol_ratio": 2.19, "momentum_5d": 7.03, "entry": "盤整突破", "ma_bull4": true, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": -0.8, "body_pct": 3.64}, "industry": "其他", "name": "聯詠", "cap_size": "中型股"}, {"code": "2340", "price": 40.9, "chg": -1.92, "score": 95, "signals": ["題材", "趨勢", "籌碼", "動能"], "consolidation_days": 14, "vol_ratio": 1.57, "momentum_5d": 15.7, "entry": "題材熱股", "ma_bull4": true, "details": {"breakout": false, "over_prev_high": false, "support_hold": true, "pullback_pct": 10.89, "body_pct": -5.54}, "industry": "其他", "name": "台亞", "cap_size": "小型股"}, {"code": "3030", "price": 413.0, "chg": -0.24, "score": 95, "signals": ["題材", "趨勢", "籌碼", "動能"], "consolidation_days": 16, "vol_ratio": 1.6, "momentum_5d": 26.11, "entry": "題材熱股", "ma_bull4": true, "details": {"breakout": false, "over_prev_high": false, "support_hold": true, "pullback_pct": 0.24, "body_pct": -3.05}, "industry": "其他", "name": "德律", "cap_size": "中型股"}, {"code": "3032", "price": 66.5, "chg": 0.76, "score": 95, "signals": ["題材", "趨勢", "籌碼", "動能"], "consolidation_days": 43, "vol_ratio": 1.57, "momentum_5d": 5.89, "entry": "題材熱股", "ma_bull4": false, "details": {"breakout": true, "over_prev_high": false, "support_hold": true, "pullback_pct": 0.75, "body_pct": -0.3}, "industry": "電子零組件", "name": "偉訓", "cap_size": "小型股"}, {"code": "3022", "price": 74.0, "chg": -1.33, "score": 95, "signals": ["題材", "趨勢", "籌碼", "動能"], "consolidation_days": 18, "vol_ratio": 1.52, "momentum_5d": 7.4, "entry": "題材熱股", "ma_bull4": true, "details": {"breakout": false, "over_prev_high": false, "support_hold": true, "pullback_pct": 2.25, "body_pct": -3.27}, "industry": "其他", "name": "威強電", "cap_size": "小型股"}, {"code": "3455", "price": 298.0, "chg": 1.53, "score": 85, "signals": ["趨勢", "型態", "動能"], "consolidation_days": 17, "vol_ratio": 2.57, "momentum_5d": 37.01, "entry": "回後買上漲", "ma_bull4": true, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": -1.53, "body_pct": -7.6}, "industry": "光電", "name": "由田", "cap_size": "中型股"}, {"code": "3016", "price": 114.5, "chg": 6.02, "score": 85, "signals": ["趨勢", "型態", "動能"], "consolidation_days": 9, "vol_ratio": 4.29, "momentum_5d": 54.31, "entry": "回後買上漲", "ma_bull4": true, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": -6.02, "body_pct": -3.38}, "industry": "其他", "name": "嘉晶", "cap_size": "中型股"}, {"code": "3028", "price": 76.5, "chg": 9.91, "score": 85, "signals": ["趨勢", "型態", "動能"], "consolidation_days": 10, "vol_ratio": 1.0, "momentum_5d": 8.05, "entry": "回後買上漲", "ma_bull4": true, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": 0.0, "body_pct": 5.96}, "industry": "其他", "name": "增你強", "cap_size": "小型股"}, {"code": "3023", "price": 305.5, "chg": 5.71, "score": 85, "signals": ["趨勢", "型態", "動能"], "consolidation_days": 15, "vol_ratio": 2.43, "momentum_5d": 11.09, "entry": "回後買上漲", "ma_bull4": true, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": -1.16, "body_pct": 3.04}, "industry": "電子零組件", "name": "信邦", "cap_size": "中型股"}, {"code": "3026", "price": 273.0, "chg": 9.86, "score": 85, "signals": ["趨勢", "型態", "動能"], "consolidation_days": 6, "vol_ratio": 2.24, "momentum_5d": 16.67, "entry": "回後買上漲", "ma_bull4": true, "details": {"breakout": true, "over_prev_high": true, "support_hold": true, "pullback_pct": -0.74, "body_pct": 0.0}, "industry": "電子零組件", "name": "禾伸堂", "cap_size": "中型股"}];
let sKey='score', sDir=-1, actSigs=new Set();

function getFiltered() {
  const ms = +document.getElementById('f-score').value||0;
  const ef = document.getElementById('f-entry').value;
  const inf = document.getElementById('f-ind').value;
  const cf = document.getElementById('f-cap').value;
  
  return ALL.filter(s => {
    if(s.score < ms) return false;
    if(ef && s.entry !== ef) return false;
    if(inf && s.industry !== inf) return false;
    if(cf && s.cap_size !== cf) return false;
    if(actSigs.size > 0) {
      const hasAll = [...actSigs].every(sig => s.signals.includes(sig));
      if(!hasAll) return false;
    }
    return true;
  }).sort((a,b) => {
    const va = a[sKey], vb = b[sKey];
    return (typeof va === 'number' ? va-vb : String(va).localeCompare(String(vb))) * sDir;
  });
}

function render() {
  const data = getFiltered();
  document.getElementById('cnt').textContent = data.length;
  const tbody = document.getElementById('tbody');
  
  if(!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:48px;color:var(--muted)">無符合條件</td></tr>';
    return;
  }
  
  tbody.innerHTML = data.map(s => {
    const chgStr = (s.chg>=0?'+':'') + s.chg + '%';
    const chgClass = s.chg>=0 ? 'up' : 'down';
    const sigs = s.signals.map(sig => `<span class="sig sig-${sig}">${sig}</span>`).join('');
    const url = `https://www.wantgoo.com/stock/${s.code}/technical-chart`;
    
    return `<tr>
      <td><a class="stock-link" href="${url}" target="_blank">${s.code}</a></td>
      <td>${s.price}</td>
      <td class="${chgClass}">${chgStr}</td>
      <td><strong>${s.score}</strong></td>
      <td>${sigs}</td>
      <td>${s.industry}</td>
      <td>${s.cap_size}</td>
      <td>${s.entry}</td>
    </tr>`;
  }).join('');
}

function toggleSig(btn) {
  const sig = btn.dataset.sig;
  if(actSigs.has(sig)) {
    actSigs.delete(sig);
    btn.classList.remove('on');
  } else {
    actSigs.add(sig);
    btn.classList.add('on');
  }
  render();
}

function sortBy(key, th) {
  if(sKey === key) sDir *= -1;
  else { sKey = key; sDir = -1; }
  document.querySelectorAll('th').forEach(t => t.textContent = t.textContent.replace(/ [▲▼]/, ''));
  th.textContent += sDir === -1 ? ' ▼' : ' ▲';
  render();
}

render();
</script>
</body></html>
