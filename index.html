<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>飆股雷達 2026-06-19</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c0f;--surface:#111418;--surface2:#181c22;--border:#222830;--accent:#f0b429;--text:#e2e8f0;--muted:#718096;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;}
header{border-bottom:1px solid var(--border);padding:20px 32px;position:sticky;top:0;background:rgba(10,12,15,.95);z-index:50}
.logo{font-size:20px;font-weight:900;color:var(--accent)}
main{max-width:1600px;margin:0 auto;padding:32px}
.filter-panel{background:var(--surface);border:1px solid var(--border);padding:24px;margin-bottom:32px;border-radius:4px}
.filters-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:20px}
.filter-group{display:flex;flex-direction:column;gap:8px}
.f-select,.f-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;width:100%;border-radius:2px}
.toggle-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.toggle-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:2px;font-size:11px}
.toggle-btn.on{background:rgba(240,180,41,.12);border-color:var(--accent);color:var(--accent)}
.run-btn{width:100%;padding:14px;margin-top:20px;background:var(--accent);color:#0a0c0f;font-weight:700;border:none;cursor:pointer;border-radius:2px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px;text-align:left;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:10px;border-bottom:1px solid rgba(34,40,48,.6)}
.stock-link{text-decoration:none;color:#63b3ed}
.stock-link:hover{text-decoration:underline}
.sig{display:inline-block;padding:2px 6px;font-size:10px;border-radius:2px;margin:1px;font-weight:600}
.sig-型態{background:#dbeafe;color:#1d4ed8}
.sig-籌碼{background:#fef9c3;color:#92400e}
.sig-趨勢{background:#dcfce7;color:#15803d}
.sig-動能{background:#f3e8ff;color:#7e22ce}
.sig-題材{background:#fee2e2;color:#b91c1c}
.ok{color:#68d391;font-weight:600}.ng{color:#fc8181;font-weight:600}
.up{color:#fc8181}.down{color:#68d391}
.empty{text-align:center;padding:48px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="logo">🎯 飆股雷達</div>
  <div style="font-size:12px;color:var(--muted);margin-top:4px">2026-06-19（週五） • 18 檔</div>
</header>
<main>
<div class="filter-panel">
  <div style="background:rgba(252,141,129,.1);border:1px solid rgba(252,141,129,.3);border-radius:4px;padding:14px;margin-bottom:20px">
    <div style="font-size:12px;font-weight:700;color:#fc8181;margin-bottom:8px">📌 操作指引（散戶護身符）</div>
    <div style="font-size:11px;color:var(--muted);line-height:1.8">
      ✅ <strong>買進訊號：</strong> 股價站上 5MA（五軍），搭配量能確認<br>
      ❌ <strong>賣出訊號：</strong> 跌破 5MA（五軍），或頭頭低（新高失守）<br>
      ⚠️ <strong>風險控制：</strong> 遵守進場條件，不追高，保護資金最重要
    </div>
  </div>
  
  <div class="filters-grid">
    <div>
      <label style="font-size:11px;color:var(--muted)">進場策略</label>
      <select class="f-select" id="f-entry" onchange="render()">
        <option value="">全部</option>
        <option value="盤整突破">盤整突破</option>
        <option value="回後買上漲">回後買上漲</option>
        <option value="強勢上漲">強勢上漲</option>
        <option value="題材熱股">題材熱股</option>
      </select>
    </div>
    <div>
      <label style="font-size:11px;color:var(--muted)">最低評分</label>
      <input class="f-input" type="number" id="f-score" value="55" min="0" max="100" onchange="render()">
    </div>
    <div>
      <label style="font-size:11px;color:var(--muted)">最低股價</label>
      <input class="f-input" type="number" id="f-price" value="20" min="0" max="1000" onchange="render()">
    </div>
  </div>
  
  <div class="toggle-row">
    <span style="font-size:11px;color:var(--muted)">訊號篩選：</span>
    <button class="toggle-btn" data-sig="型態" onclick="toggleSig(this)">型態</button>
    <button class="toggle-btn" data-sig="籌碼" onclick="toggleSig(this)">籌碼</button>
    <button class="toggle-btn" data-sig="趨勢" onclick="toggleSig(this)">趨勢</button>
    <button class="toggle-btn" data-sig="動能" onclick="toggleSig(this)">動能</button>
    <button class="toggle-btn" data-sig="題材" onclick="toggleSig(this)">題材</button>
  </div>
  <button class="run-btn" onclick="render()">🔍 套用篩選</button>
</div>

<div style="margin-bottom:16px">
  <span style="font-size:13px">找到 <span id="cnt" style="color:var(--accent);font-weight:700">-</span> 檔候選</span>
</div>
<div class="table-wrap">
  <table>
    <thead><tr style="background:var(--surface2)">
      <th onclick="sortBy('code',this)">代號</th>
      <th>名稱</th>
      <th onclick="sortBy('prev_close',this)">昨日收</th>
      <th onclick="sortBy('prev_vol',this)">昨日量</th>
      <th onclick="sortBy('price',this)">今日收</th>
      <th onclick="sortBy('volume',this)">今日量</th>
      <th>5日均價</th>
      <th onclick="sortBy('chg',this)">漲跌%</th>
      <th>上影線%</th>
      <th>量比(5日)</th>
      <th>量比(昨日)</th>
      <th onclick="sortBy('ma20_trend',this)">20MA趨勢</th>
      <th onclick="sortBy('consolidation_days',this)">地基天數</th>
      <th onclick="sortBy('score',this)">評分</th>
      <th>訊號</th>
      <th>進場策略</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</main>

<script>
const ALL = [{"code": "2241", "name": "艾姆勒", "price": 50.6, "chg": 9.88, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 46.0, "prev_vol": 5044811, "volume": 8362429, "avg_price_5d": 43.4, "upper_shadow_pct": 0.0, "vol_ma5": 5009076.0, "ma20_trend": "上彎", "consolidation_days": 0}, {"code": "8464", "name": "億豐", "price": 358.0, "chg": 2.43, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 349.5, "prev_vol": 923694, "volume": 1306211, "avg_price_5d": 346.0, "upper_shadow_pct": 0.0, "vol_ma5": 661587.0, "ma20_trend": "震盪", "consolidation_days": 3}, {"code": "8476", "name": "台境", "price": 21.8, "chg": 9.85, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 19.8, "prev_vol": 708726, "volume": 3430370, "avg_price_5d": 19.6, "upper_shadow_pct": 0.0, "vol_ma5": 1512991.0, "ma20_trend": "上彎", "consolidation_days": 0}, {"code": "6949", "name": "沛爾生醫-創", "price": 911.0, "chg": 1.79, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 895.0, "prev_vol": 303249, "volume": 740735, "avg_price_5d": 774.0, "upper_shadow_pct": 6.26, "vol_ma5": 314076.0, "ma20_trend": "震盪", "consolidation_days": 0}, {"code": "00857B", "name": "永豐20年美公債", "price": 23.6, "chg": 0.77, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 23.4, "prev_vol": 1426571, "volume": 3023603, "avg_price_5d": 23.4, "upper_shadow_pct": 0.04, "vol_ma5": 1723737.0, "ma20_trend": "上彎", "consolidation_days": 165}, {"code": "00746B", "name": "富邦A級公司債", "price": 35.9, "chg": 0.31, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 35.8, "prev_vol": 492335, "volume": 1199015, "avg_price_5d": 35.7, "upper_shadow_pct": 0.0, "vol_ma5": 632778.0, "ma20_trend": "上彎", "consolidation_days": 165}, {"code": "00877", "name": "復華中國5G", "price": 48.9, "chg": 5.89, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 46.2, "prev_vol": 3006413, "volume": 4637326, "avg_price_5d": 44.1, "upper_shadow_pct": 0.0, "vol_ma5": 3564238.0, "ma20_trend": "上彎", "consolidation_days": 0}, {"code": "00727B", "name": "國泰優選非投等債", "price": 39.6, "chg": 0.1, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 39.6, "prev_vol": 120935, "volume": 535312, "avg_price_5d": 39.6, "upper_shadow_pct": 0.08, "vol_ma5": 129014.0, "ma20_trend": "上彎", "consolidation_days": 165}, {"code": "00847B", "name": "中信美國市政債", "price": 25.7, "chg": 0.2, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 25.6, "prev_vol": 202000, "volume": 545000, "avg_price_5d": 25.5, "upper_shadow_pct": 0.19, "vol_ma5": 286454.0, "ma20_trend": "震盪", "consolidation_days": 165}, {"code": "00761B", "name": "國泰A級公司債", "price": 34.8, "chg": 0.32, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 34.7, "prev_vol": 85148, "volume": 790998, "avg_price_5d": 34.6, "upper_shadow_pct": 0.09, "vol_ma5": 364601.0, "ma20_trend": "震盪", "consolidation_days": 165}, {"code": "00725B", "name": "國泰投資級公司債", "price": 35.6, "chg": 0.48, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 35.5, "prev_vol": 1709190, "volume": 5245480, "avg_price_5d": 35.4, "upper_shadow_pct": 0.03, "vol_ma5": 3530109.0, "ma20_trend": "上彎", "consolidation_days": 165}, {"code": "00888", "name": "永豐台灣ESG", "price": 36.7, "chg": 2.89, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 35.6, "prev_vol": 3275543, "volume": 5203498, "avg_price_5d": 34.7, "upper_shadow_pct": 0.0, "vol_ma5": 4207183.0, "ma20_trend": "上彎", "consolidation_days": 0}, {"code": "7715", "name": "裕山", "price": 32.4, "chg": 8.0, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 30.0, "prev_vol": 81626, "volume": 926558, "avg_price_5d": 29.3, "upper_shadow_pct": 1.85, "vol_ma5": 270601.0, "ma20_trend": "震盪", "consolidation_days": 1}, {"code": "6435", "name": "大中", "price": 317.5, "chg": 9.86, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 289.0, "prev_vol": 900851, "volume": 857998, "avg_price_5d": 275.6, "upper_shadow_pct": 0.0, "vol_ma5": 634874.0, "ma20_trend": "上彎", "consolidation_days": 0}, {"code": "4958", "name": "臻鼎-KY", "price": 642.0, "chg": 0.47, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 639.0, "prev_vol": 36308304, "volume": 53927871, "avg_price_5d": 586.8, "upper_shadow_pct": 1.87, "vol_ma5": 45397798.0, "ma20_trend": "上彎", "consolidation_days": 0}, {"code": "6220", "name": "岳豐", "price": 38.4, "chg": 7.12, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 35.8, "prev_vol": 915120, "volume": 2370701, "avg_price_5d": 35.5, "upper_shadow_pct": 0.39, "vol_ma5": 1534968.0, "ma20_trend": "上彎", "consolidation_days": 0}, {"code": "6166", "name": "凌華", "price": 155.5, "chg": 9.12, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 142.5, "prev_vol": 1516757, "volume": 5724596, "avg_price_5d": 135.6, "upper_shadow_pct": 0.64, "vol_ma5": 2939133.0, "ma20_trend": "上彎", "consolidation_days": 0}, {"code": "6175", "name": "立敦", "price": 114.0, "chg": 6.05, "score": 100, "signals": ["型態", "籌碼", "趨勢", "題材"], "entry": "題材熱股", "prev_close": 107.5, "prev_vol": 12823331, "volume": 28591141, "avg_price_5d": 103.0, "upper_shadow_pct": 2.63, "vol_ma5": 15109803.0, "ma20_trend": "上彎", "consolidation_days": 0}];
let sKey='score', sDir=-1, actSigs=new Set();

function getFiltered() {
  const ms = +document.getElementById('f-score').value||0;
  const mp = +document.getElementById('f-price').value||0;
  const ef = document.getElementById('f-entry').value;
  
  return ALL.filter(s => {
    if(s.score < ms) return false;
    if(s.price < mp) return false;
    if(ef && s.entry !== ef) return false;
    if(actSigs.size > 0) {
      const hasAll = [...actSigs].every(sig => s.signals.includes(sig));
      if(!hasAll) return false;
    }
    return true;
  }).sort((a,b) => {
    const va = a[sKey], vb = b[sKey];
    return (typeof va === 'number' ? va-vb : String(va).localeCompare(String(vb))) * sDir;
  });
}

function render() {
  const data = getFiltered();
  document.getElementById('cnt').textContent = data.length;
  const tbody = document.getElementById('tbody');
  
  if(!data.length) {
    tbody.innerHTML = '<tr><td colspan="16" class="empty">無符合條件的標的</td></tr>';
    return;
  }
  
  tbody.innerHTML = data.map(s => {
    const chgStr = (s.chg>=0?'+':'') + s.chg + '%';
    const chgClass = s.chg>=0 ? 'up' : 'down';
    const sigs = s.signals.map(sig => `<span class="sig sig-${sig}">${sig}</span>`).join('');
    const url = `https://www.wantgoo.com/stock/${s.code}/technical-chart`;
    const vol_ratio_5d = s.vol_ma5 > 0 ? (s.volume / s.vol_ma5).toFixed(2) : 'N/A';
    const vol_ratio_prev = s.prev_vol > 0 ? (s.volume / s.prev_vol).toFixed(2) : 'N/A';
    
    return `<tr>
      <td><a class="stock-link" href="${url}" target="_blank">${s.code}</a></td>
      <td>${s.name}</td>
      <td>${s.prev_close}</td>
      <td>${s.prev_vol.toLocaleString()}</td>
      <td><strong>${s.price}</strong></td>
      <td>${s.volume.toLocaleString()}</td>
      <td>${s.avg_price_5d}</td>
      <td class="${chgClass}">${chgStr}</td>
      <td>${s.upper_shadow_pct.toFixed(2)}%</td>
      <td class="${vol_ratio_5d >= 1.0 ? 'ok' : 'ng'}">${vol_ratio_5d}</td>
      <td class="${vol_ratio_prev >= 1.5 ? 'ok' : 'ng'}">${vol_ratio_prev}</td>
      <td style="color:${s.ma20_trend==='上彎'?'#68d391':s.ma20_trend==='下彎'?'#fc8181':'#718096'};font-weight:600">${s.ma20_trend}</td>
      <td><strong>${s.consolidation_days}</strong>天</td>
      <td><strong>${s.score}</strong></td>
      <td>${sigs}</td>
      <td>${s.entry}</td>
    </tr>`;
  }).join('');
}

function toggleSig(btn) {
  const sig = btn.dataset.sig;
  if(actSigs.has(sig)) {
    actSigs.delete(sig);
    btn.classList.remove('on');
  } else {
    actSigs.add(sig);
    btn.classList.add('on');
  }
  render();
}

function sortBy(key, th) {
  if(sKey === key) sDir *= -1;
  else { sKey = key; sDir = -1; }
  document.querySelectorAll('th').forEach(t => t.textContent = t.textContent.replace(/ [▲▼]/, ''));
  th.textContent += sDir === -1 ? ' ▼' : ' ▲';
  render();
}

render();
</script>
</body></html>
